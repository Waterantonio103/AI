name: Blender JSON Scrape

on:
  workflow_dispatch:
    inputs:
      max_repos:
        description: "Max repos per query group"
        default: "500"
        required: false
      min_score:
        description: "filter_dataset.py min-score threshold"
        default: "2"
        required: false
      runs:
        description: "Number of scrape rounds (1–10). Each round runs all 4 query groups."
        default: "1"
        required: false

  schedule:
    # Every Sunday at 02:00 UTC
    - cron: "0 2 * * 0"

env:
  BUILD_DIR: blender_scraper/build

# ---------------------------------------------------------------------------
# Job 1 — Build the scraper binary and cache it for all scrape jobs
# ---------------------------------------------------------------------------
jobs:
  build:
    name: Build scraper
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            cmake ninja-build libcurl4-openssl-dev

      - name: Cache CMake build
        uses: actions/cache@v4
        id: cmake-cache
        with:
          path: ${{ env.BUILD_DIR }}
          key: cmake-${{ runner.os }}-${{ hashFiles('blender_scraper/CMakeLists.txt', 'blender_scraper/src/**') }}

      - name: Configure & build
        if: steps.cmake-cache.outputs.cache-hit != 'true'
        run: |
          cmake -S blender_scraper -B $BUILD_DIR \
                -G Ninja \
                -DCMAKE_BUILD_TYPE=Release
          cmake --build $BUILD_DIR --parallel

      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: scraper-bin
          path: |
            ${{ env.BUILD_DIR }}/blender_scraper
            ${{ env.BUILD_DIR }}/build_dataset
          retention-days: 1

  # ---------------------------------------------------------------------------
  # Job 2 — Generate the scrape matrix dynamically from the `runs` input.
  # Produces exactly (runs × 4) jobs instead of a fixed 10×4 grid.
  # ---------------------------------------------------------------------------
  setup:
    name: Generate matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.gen.outputs.matrix }}
    steps:
      - name: Build matrix JSON
        id: gen
        run: |
          python3 - <<'PYEOF'
          import json, os
          runs  = int(os.environ.get("RUNS", "1"))
          groups = [
            {"name": "topics",         "token_secret": "SCRAPER_GITHUB_TOKEN_1"},
            {"name": "keywords-early", "token_secret": "SCRAPER_GITHUB_TOKEN_2"},
            {"name": "keywords-mid",   "token_secret": "SCRAPER_GITHUB_TOKEN_3"},
            {"name": "keywords-late",  "token_secret": "SCRAPER_GITHUB_TOKEN_4"},
          ]
          include = [{"run": r, "group": g} for r in range(1, runs + 1) for g in groups]
          with open(os.environ["GITHUB_OUTPUT"], "a") as fh:
              fh.write("matrix=" + json.dumps({"include": include}) + "\n")
          PYEOF
        env:
          RUNS: ${{ github.event.inputs.runs || '1' }}
        shell: bash
      - run: echo "${{ steps.gen.outputs.matrix }}" | python3 -m json.tool  # sanity-check

  # ---------------------------------------------------------------------------
  # Job 3 — Parallel scrape: (runs × 4 query groups) jobs, all generated above.
  #
  # Token assignment: one PAT per query group for maximum throughput.
  # Add SCRAPER_GITHUB_TOKEN_2…4 secrets to avoid sharing the rate-limit
  # bucket across groups. Falls back to GITHUB_TOKEN if a secret is unset.
  # ---------------------------------------------------------------------------
  scrape:
    name: "Scrape (${{ matrix.group.name }}, round ${{ matrix.run }})"
    needs: [build, setup]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.setup.outputs.matrix) }}

    steps:
      - uses: actions/checkout@v4

      - name: Install libcurl
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends libcurl4-openssl-dev

      - name: Download scraper binary
        uses: actions/download-artifact@v4
        with:
          name: scraper-bin
          path: ${{ env.BUILD_DIR }}

      - name: Make binary executable
        run: chmod +x ${{ env.BUILD_DIR }}/blender_scraper

      # Restore previously downloaded files so Phase 3 can skip already-saved ones
      - name: Restore output cache
        uses: actions/cache@v4
        with:
          path: output-${{ matrix.group.name }}-run${{ matrix.run }}
          key: output-${{ matrix.group.name }}-run${{ matrix.run }}-${{ github.run_number }}
          restore-keys: |
            output-${{ matrix.group.name }}-run${{ matrix.run }}-

      - name: Run scraper
        env:
          GH_TOKEN: ${{ secrets[matrix.group.token_secret] || secrets.GITHUB_TOKEN }}
        run: |
          ${{ env.BUILD_DIR }}/blender_scraper \
            --github-token "$GH_TOKEN" \
            --output        output-${{ matrix.group.name }}-run${{ matrix.run }} \
            --max-repos     ${{ github.event.inputs.max_repos || '500' }} \
            --query-group   ${{ matrix.group.name }} \
            --threads       8 \
            --rps           4

      - name: Upload output
        uses: actions/upload-artifact@v4
        with:
          name: output-${{ matrix.group.name }}-run${{ matrix.run }}
          path: output-${{ matrix.group.name }}-run${{ matrix.run }}
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Job 4 — Merge all outputs, produce one zip per round + one combined zip
  #
  # Artifact layout inside blender-nodes-dataset-<run_number>/:
  #   dataset-run1.zip   — raw + filtered JSONL for round 1 (all 4 groups)
  #   dataset-run2.zip   — round 2, etc.
  #   dataset-combined.zip — merged + filtered across all rounds
  # ---------------------------------------------------------------------------
  merge:
    name: Merge & package datasets
    needs: [setup, scrape]
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v4

      - name: Download all scrape outputs
        uses: actions/download-artifact@v4
        with:
          pattern: output-*
          path: artifacts

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Build per-round merged JSONL files, then zip each round.
      - name: Merge shards per round
        run: |
          RUNS=${{ github.event.inputs.runs || '1' }}
          mkdir -p zips

          for run in $(seq 1 $RUNS); do
            mkdir -p "round-${run}"
            for f in artifacts/output-*-run${run}/training_dataset.jsonl; do
              [ -f "$f" ] && cat "$f" >> "round-${run}/training_dataset.jsonl"
            done

            if [ -f "round-${run}/training_dataset.jsonl" ]; then
              echo "Round ${run} raw records: $(wc -l < round-${run}/training_dataset.jsonl)"
            else
              echo "::warning::Round ${run} produced no output."
            fi
          done

      - name: Filter & deduplicate per round
        run: |
          RUNS=${{ github.event.inputs.runs || '1' }}
          MIN_SCORE=${{ github.event.inputs.min_score || '2' }}

          for run in $(seq 1 $RUNS); do
            RAW="round-${run}/training_dataset.jsonl"
            [ -f "$RAW" ] || continue

            MAX_RETRIES=3
            RETRY_WAIT=3600

            for attempt in $(seq 1 $MAX_RETRIES); do
              python blender_scraper/filter_dataset.py \
                "$RAW" \
                "round-${run}/blender_nodes_dataset.jsonl" \
                --min-score "$MIN_SCORE" \
                --verbose
              EXIT_CODE=$?

              if [ $EXIT_CODE -eq 0 ]; then
                echo "Round ${run} filtered records: $(wc -l < round-${run}/blender_nodes_dataset.jsonl)"
                break
              elif [ $EXIT_CODE -eq 1 ] && [ $attempt -lt $MAX_RETRIES ]; then
                echo "::warning::Round ${run} filter attempt ${attempt}/${MAX_RETRIES} failed (API tokens exhausted). Retrying in ${RETRY_WAIT}s…"
                sleep $RETRY_WAIT
              else
                echo "::error::Round ${run} filter failed (exit $EXIT_CODE) after ${attempt}/${MAX_RETRIES} attempts."
                exit $EXIT_CODE
              fi
            done
          done

      - name: Build combined dataset across all rounds
        run: |
          RUNS=${{ github.event.inputs.runs || '1' }}
          MIN_SCORE=${{ github.event.inputs.min_score || '2' }}
          mkdir -p combined

          for run in $(seq 1 $RUNS); do
            [ -f "round-${run}/training_dataset.jsonl" ] && \
              cat "round-${run}/training_dataset.jsonl" >> combined/training_dataset.jsonl
          done

          if [ -f combined/training_dataset.jsonl ]; then
            echo "Combined raw records: $(wc -l < combined/training_dataset.jsonl)"

            MAX_RETRIES=3
            RETRY_WAIT=3600
            for attempt in $(seq 1 $MAX_RETRIES); do
              python blender_scraper/filter_dataset.py \
                combined/training_dataset.jsonl \
                combined/blender_nodes_dataset.jsonl \
                --min-score "$MIN_SCORE" \
                --verbose
              EXIT_CODE=$?
              if [ $EXIT_CODE -eq 0 ]; then
                echo "Combined filtered records: $(wc -l < combined/blender_nodes_dataset.jsonl)"
                break
              elif [ $EXIT_CODE -eq 1 ] && [ $attempt -lt $MAX_RETRIES ]; then
                echo "::warning::Combined filter attempt ${attempt}/${MAX_RETRIES} failed. Retrying in ${RETRY_WAIT}s…"
                sleep $RETRY_WAIT
              else
                echo "::error::Combined filter failed (exit $EXIT_CODE) after ${attempt}/${MAX_RETRIES} attempts."
                exit $EXIT_CODE
              fi
            done
          fi

      - name: Package into zips
        run: |
          RUNS=${{ github.event.inputs.runs || '1' }}

          for run in $(seq 1 $RUNS); do
            DIR="round-${run}"
            [ -d "$DIR" ] || continue
            # At least one jsonl must exist to be worth zipping
            if ls "$DIR"/*.jsonl 1>/dev/null 2>&1; then
              zip -j "zips/dataset-run${run}.zip" "$DIR"/*.jsonl
              echo "Created zips/dataset-run${run}.zip"
            fi
          done

          if ls combined/*.jsonl 1>/dev/null 2>&1; then
            zip -j zips/dataset-combined.zip combined/*.jsonl
            echo "Created zips/dataset-combined.zip"
          fi

          echo "--- zip inventory ---"
          ls -lh zips/

      - name: Upload dataset zips
        uses: actions/upload-artifact@v4
        with:
          name: blender-nodes-dataset-${{ github.run_number }}
          path: zips/
          retention-days: 30

      # Optional: commit the curated dataset to a dedicated data branch
      - name: Commit dataset to data branch
        if: github.ref == 'refs/heads/main' && github.event_name == 'schedule'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin data || git checkout --orphan data
          git checkout data 2>/dev/null || git checkout -b data
          cp combined/blender_nodes_dataset.jsonl blender_nodes_dataset.jsonl
          git add blender_nodes_dataset.jsonl
          git diff --cached --quiet || \
            git commit -m "chore: update dataset $(date -u +%Y-%m-%d)"
          git push origin data
